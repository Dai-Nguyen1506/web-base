version: '3.8'

services:
  db-postgre:
    image: postgres:15-alpine
    container_name: PostgreSQL
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-web_base}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: Backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db-postgre:5432/${POSTGRES_DB:-web_base}
    depends_on:
      - db-postgre
    volumes:
      - ./backend:/app
      - .:/workspace
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: Frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    volumes:
      - .frontend:/app
      - .:/workspace
    restart: unless-stopped

volumes:
  postgres_data:
