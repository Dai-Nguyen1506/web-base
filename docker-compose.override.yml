services:
  backend:
    volumes:
      - ./backend:/app
      - .:/workspace

  frontend:
    image: node:18-alpine
    container_name: Frontend
    working_dir: /app
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - .:/workspace
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped